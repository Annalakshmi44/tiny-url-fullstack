name: Build and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: '8.0.x'
  NODE_VERSION: '20.x'
  AZURE_API_APP_NAME: 'app-tinyurl-api'
  AZURE_WEB_APP_NAME: 'app-tinyurl-web'
  AZURE_FUNCTION_APP_NAME: 'func-tinyurl-cleanup'

jobs:
  build-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore src/TinyUrl.Api/TinyUrl.Api.csproj

      - name: Build
        run: dotnet build src/TinyUrl.Api/TinyUrl.Api.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish src/TinyUrl.Api/TinyUrl.Api.csproj --configuration Release --output ./api-output

      - name: Upload API artifact
        uses: actions/upload-artifact@v4
        with:
          name: api
          path: ./api-output

  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: src/TinyUrl.Web/package-lock.json

      - name: Install dependencies
        working-directory: src/TinyUrl.Web
        run: npm ci

      - name: Build
        working-directory: src/TinyUrl.Web
        run: npm run build -- --configuration production

      - name: Upload Web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web
          path: src/TinyUrl.Web/dist/tiny-url-web/browser

  build-function:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Build Function
        run: dotnet publish src/TinyUrl.Functions/TinyUrl.Functions.csproj --configuration Release --output ./function-output

      - name: Upload Function artifact
        uses: actions/upload-artifact@v4
        with:
          name: function
          path: ./function-output

  deploy:
    needs: [build-api, build-web, build-function]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Download API artifact
        uses: actions/download-artifact@v4
        with:
          name: api
          path: ./api

      - name: Download Web artifact
        uses: actions/download-artifact@v4
        with:
          name: web
          path: ./web

      - name: Download Function artifact
        uses: actions/download-artifact@v4
        with:
          name: function
          path: ./function

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy API to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_API_APP_NAME }}
          package: ./api

      - name: Deploy Web to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEB_APP_NAME }}
          package: ./web

      - name: Deploy Function to Azure
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTION_APP_NAME }}
          package: ./function
